name: Release AAB

# Builds a Play-ready, signed Android App Bundle (.aab). Run it manually
# (workflow_dispatch) or by pushing a v* tag. The bundle is uploaded as a build
# artifact only — publishing to Google Play stays a manual Console step.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Android SDK Platform 36 (Android 16)
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then SDKMANAGER="sdkmanager"; fi
          yes | "$SDKMANAGER" "platforms;android-36" >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Prepare release keystore
        id: keystore
        run: |
          KS="$RUNNER_TEMP/release.jks"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KS"
            {
              echo "KEYSTORE_PATH=$KS"
              echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
              echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
              echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
            } >> "$GITHUB_ENV"
            echo "mode=upload-key" >> "$GITHUB_OUTPUT"
            echo "Using the repository's upload key."
          else
            echo "::warning::KEYSTORE_BASE64 secret is not set — generating an EPHEMERAL keystore so the signed-bundle pipeline can be verified. This bundle is NOT for Play upload; set the four repo secrets to sign with your stable upload key."
            EPH=$(openssl rand -hex 24)
            echo "::add-mask::$EPH"
            keytool -genkeypair -dname "CN=Route Spoofer CI, O=Route Spoofer" \
              -alias ci-ephemeral -keyalg RSA -keysize 2048 -validity 365 \
              -keystore "$KS" -storepass "$EPH" -keypass "$EPH"
            {
              echo "KEYSTORE_PATH=$KS"
              echo "KEYSTORE_PASSWORD=$EPH"
              echo "KEY_ALIAS=ci-ephemeral"
              echo "KEY_PASSWORD=$EPH"
            } >> "$GITHUB_ENV"
            echo "mode=ephemeral" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate keystore & credentials
        run: |
          # Load the keystore and actually recover the private key exactly the way
          # Gradle's signing does — this catches the PKCS12 case where keytool
          # ignores a separate -keypass (so KEY_PASSWORD must equal the store
          # password). keytool -certreq would silently pass that bad case.
          cat > "$RUNNER_TEMP/KeyCheck.java" <<'JAVA'
          import java.io.FileInputStream;
          import java.security.KeyStore;
          import java.security.UnrecoverableKeyException;
          public class KeyCheck {
              public static void main(String[] args) {
                  String path = System.getenv("KEYSTORE_PATH");
                  String storePass = System.getenv("KEYSTORE_PASSWORD");
                  String alias = System.getenv("KEY_ALIAS");
                  String keyPass = System.getenv("KEY_PASSWORD");
                  KeyStore ks = null;
                  try {
                      ks = KeyStore.getInstance("PKCS12");
                      try (FileInputStream f = new FileInputStream(path)) {
                          ks.load(f, storePass == null ? null : storePass.toCharArray());
                      }
                  } catch (Exception e) {
                      System.err.println("STORE: " + e.getMessage());
                      System.exit(2);
                  }
                  try {
                      if (!ks.containsAlias(alias)) { System.err.println("ALIAS: '" + alias + "' not found"); System.exit(3); }
                      if (ks.getKey(alias, keyPass == null ? new char[0] : keyPass.toCharArray()) == null) {
                          System.err.println("ALIAS: '" + alias + "' has no key"); System.exit(3);
                      }
                  } catch (UnrecoverableKeyException e) {
                      System.err.println("KEYPASS"); System.exit(4);
                  } catch (Exception e) {
                      System.err.println("OTHER: " + e.getMessage()); System.exit(5);
                  }
                  System.out.println("ok");
              }
          }
          JAVA
          javac -d "$RUNNER_TEMP" "$RUNNER_TEMP/KeyCheck.java"
          set +e
          OUT=$(java -cp "$RUNNER_TEMP" KeyCheck 2>&1); CODE=$?
          set -e
          case "$CODE" in
            0) echo "Keystore opens, alias '$KEY_ALIAS' present, key recovered with KEY_PASSWORD. ($OUT)" ;;
            2) echo "::error::Cannot open the keystore with KEYSTORE_PASSWORD — re-check KEYSTORE_BASE64 / KEYSTORE_PASSWORD. ($OUT)"; exit 1 ;;
            3) echo "::error::$OUT — re-check the KEY_ALIAS secret."; exit 1 ;;
            4) echo "::error::KEY_PASSWORD does not unlock the key. For a PKCS12 keystore the key password equals the store password — set KEY_PASSWORD to the same value as KEYSTORE_PASSWORD."; exit 1 ;;
            *) echo "::error::Keystore validation failed: $OUT"; exit 1 ;;
          esac

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Build signed release bundle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --stacktrace

      - name: Verify the AAB is signed
        run: |
          set -e
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          test -f "$AAB" || { echo "AAB missing"; exit 1; }
          echo "== jarsigner -verify =="
          jarsigner -verify "$AAB" | grep -q "jar verified" || { echo "AAB is NOT signed"; exit 1; }
          echo "== signature block =="
          unzip -l "$AAB" | grep -E 'META-INF/.*\.(RSA|EC|DSA)' || { echo "no v1 signature block"; exit 1; }
          echo "== package id (from bundle manifest) =="
          unzip -p "$AAB" base/manifest/AndroidManifest.xml | grep -ao 'com.routespoofer.app' | head -1
          echo "== targetSdk (from merged manifest) =="
          MM=$(find android/app/build -path '*merged_manifest*release*/AndroidManifest.xml' | head -1)
          grep -o 'targetSdkVersion="[0-9]*"' "$MM" || true
          echo "signing mode: ${{ steps.keystore.outputs.mode }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: route-spoofer-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
