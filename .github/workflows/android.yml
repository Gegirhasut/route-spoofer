name: Android Debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Android SDK Platform 36 (Android 16)
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then SDKMANAGER="sdkmanager"; fi
          yes | "$SDKMANAGER" "platforms;android-36" >/dev/null

      - name: Install dependencies
        run: npm ci

      # ---- Quality gate: lint + static analysis + unit tests run BEFORE the
      # build. If any check fails the job stops here, so no APK is uploaded and
      # no "latest" release is published.

      - name: Lint web UI (ESLint)
        run: npm run lint

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Kotlin format, static analysis & unit tests
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew ktlintCheck detekt test --stacktrace

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: route-spoofer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Stage APK under a fixed filename
        run: cp android/app/build/outputs/apk/debug/app-debug.apk route-spoofer.apk

      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: false
          files: route-spoofer.apk
